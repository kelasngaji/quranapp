// 3. LOGIKA TOMBOL LOGIN KE SPREADSHEET
window.checkLogin = function() {
    var pwd = document.getElementById("passwordInput").value.trim();
    var errorMsg = document.getElementById("errorMessage");
    var btn = document.getElementById("loginBtn");
    
    if(pwd === "") {
        errorMsg.innerText = "Password harus diisi!"; 
        errorMsg.style.display = "block"; 
        return;
    }

    errorMsg.style.display = "none"; 
    btn.innerText = "Mengecek..."; 
    btn.disabled = true;

    // URL Google Apps Script Anda
    var scriptUrl = "https://script.google.com/macros/s/AKfycbwsAKnoP9JyyfOUre1HxqEfMPCL4ZxZT94OvYHg7pzWElzkHDbUhA_pD85_WzxLWFu2eA/exec";
    
    // Hanya mengirimkan parameter password ke Google Script
    var urlWithParams = scriptUrl + "?password=" + encodeURIComponent(pwd);

    fetch(urlWithParams)
        .then(response => response.json())
        .then(data => {
            btn.innerText = "Masuk"; 
            btn.disabled = false;
            
            if (data.status === "success") {
                // Menyimpan status sukses login dan waktu hari ini ke LocalStorage (Ingatan Browser)
                localStorage.setItem('appQuran_isLoggedIn', 'true');
                localStorage.setItem('appQuran_lastSeen', new Date().getTime().toString());

                // Jika sukses, hilangkan login, TAMPILKAN WELCOME SCREEN
                document.getElementById("loginOverlay").style.display = "none";
                document.getElementById("welcomeOverlay").style.display = "flex";
            } else {
                errorMsg.innerText = "Password salah!"; 
                errorMsg.style.display = "block";
            }
        })
        .catch(error => {
            console.error("Error:", error); 
            btn.innerText = "Masuk"; 
            btn.disabled = false;
            errorMsg.innerText = "Terjadi kesalahan jaringan, mohon coba lagi."; 
            errorMsg.style.display = "block";
        });
};

// 4. LOGIKA TOMBOL BUKA APLIKASI (MULAI BELAJAR)
window.openBook = function() {
    // Selalu perbarui waktu saat mereka mengklik Mulai Belajar
    localStorage.setItem('appQuran_lastSeen', new Date().getTime().toString());
    
    // Hilangkan Welcome Overlay, akhirnya ebook flip muncul dan siap dibaca
    document.getElementById("welcomeOverlay").style.display = "none";
};
