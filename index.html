<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Qarana Digital App</title>
    <style>
        /* RESET & DASAR */
        *, *::before, *::after { box-sizing: border-box; }
        
        /* PERBAIKAN: Menangani masalah tinggi layar di Mobile */
        html, body {
            height: 100%;
            height: 100dvh; /* Dynamic Viewport Height untuk browser mobile modern */
        }

        body { 
            margin: 0; 
            background: #333; 
            width: 100vw;
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* CONTAINER UTAMA */
        #mainApp {
            width: 100%;
            max-width: 600px; 
            height: 100%;
            background: transparent; 
            display: flex;
            flex-direction: column;
            position: relative;
            /* Pastikan konten tidak tumpah */
            overflow: hidden; 
        }

        /* --- 1. NAVIGASI (HEADER) --- */
        .nav-bar {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;

            background: rgba(34, 34, 34, 0.95); 
            color: white;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            width: 100%; 
            
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);

            transition: top 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .nav-hidden .nav-bar {
            top: -80px; 
        }

        .nav-btn {
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            transition: background 0.2s;
            user-select: none;
        }
        .nav-btn:hover { background-color: rgba(255, 255, 255, 0.3); }
        .nav-btn:active { transform: scale(0.95); }

        #pageIndicator { 
            font-weight: 600; 
            font-size: 1rem; 
            color: #eee; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* --- 1.5. NAVIGASI BAWAH (TOOLBAR) --- */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;

            background: rgba(34, 34, 34, 0.95); 
            color: white;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            width: 100%; 
            
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);

            transition: bottom 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .nav-hidden .bottom-bar {
            bottom: -80px; 
        }

        .page-input {
            width: 60px;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            border: 1px solid #555;
            background: #222;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }
        .page-input:focus { outline: none; border-color: #3498db; }

        /* --- MODAL / POP-UP (TOC & ABOUT) --- */
        .modal-overlay {
            position: absolute; /* Tetap absolute agar pas dalam mainApp */
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: flex-end; 
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-height: 80%;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            padding: 20px;
            display: none;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            color: #333;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
            /* Pastikan konten modal bisa discroll jika terlalu banyak */
            overflow: hidden; 
        }
        .modal-overlay.show .modal-content.active {
            display: flex;
            transform: translateY(0);
        }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px; margin-bottom: 15px;
        }
        .modal-header h3 { margin: 0; font-size: 1.2rem; color: #2c3e50; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #7f8c8d; }

        /* TOC List */
        .toc-list { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .toc-item {
            padding: 12px; background: #f8f9fa; border: 1px solid #ddd;
            border-radius: 6px; cursor: pointer; text-align: left; font-size: 1rem;
            transition: background 0.2s;
        }
        .toc-item:hover { background: #e9ecef; }
        .toc-item.current { background: #3498db; color: white; border-color: #2980b9; font-weight: bold; }

        /* Linktree Style */
        .desc-text { font-size: 0.9rem; line-height: 1.5; color: #555; text-align: center; margin-bottom: 20px; flex-shrink: 0;}
        .linktree { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-bottom: 20px;}
        .link-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 8px; text-decoration: none; color: white;
            font-weight: bold; font-size: 1rem; transition: transform 0.2s;
            flex-shrink: 0; /* Mencegah tombol mengecil */
        }
        .link-btn:active { transform: scale(0.97); }
        .icon-svg { width: 20px; height: 20px; fill: currentColor; }

        /* Warna Platform */
        .btn-wa { background: #25D366; }
        .btn-ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-fb { background: #1877F2; }
        .btn-tiktok { background: #000000; }
        .btn-yt { background: #FF0000; }
        .btn-web { background: #2c3e50; }

        /* --- MODAL RESUME (LANJUTKAN BACA) --- */
        .resume-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 300; /* Di atas segalanya */
            display: none; 
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .resume-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .resume-box h3 { margin-top: 0; color: #2c3e50; margin-bottom: 10px; font-size: 1.3rem;}
        .resume-box p { color: #555; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.4;}
        .resume-actions { display: flex; flex-direction: column; gap: 10px; }
        .btn-resume {
            padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-resume.yes { background: #27ae60; color: white; }
        .btn-resume.yes:hover { background: #219653; }
        .btn-resume.no { background: #ecf0f1; color: #7f8c8d; }
        .btn-resume.no:hover { background: #bdc3c7; color: #2c3e50; }


        /* --- 2. AREA GAMBAR (CANVAS) --- */
        .book-container {
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow: hidden;
            position: relative;
            touch-action: none; 
        }

        /* WADAH HALAMAN (Double Buffer System) */
        .page-view {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            
            transition: transform 0.35s ease-out; 
            will-change: transform;
            
            transform: translateX(100%); 
        }
        
        .page-view.active { transform: translateX(0); z-index: 10; }
        .page-view.left   { transform: translateX(-100%); z-index: 5; }
        .page-view.right  { transform: translateX(100%); z-index: 5; }

        /* Container tambahan untuk Zoom & Pan */
        .zoom-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Transisi dihilangkan saat menggeser agar tidak ada delay/licin */
            transition: none; 
            transform-origin: center center;
            will-change: transform;
        }

        /* Gambar Halaman */
        .page-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; 
            user-select: none;
            -webkit-user-drag: none;
        }

        .page-image.is-cover {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* --- 3. HOTSPOT (AREA KLIK) --- */
        .hotspot-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hotspot-zone {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .hotspot-zone:active, .hotspot-zone.active {
            background-color: rgba(255, 230, 0, 0.3);
            border: 2px solid orange;
        }
    </style>
</head>

    <script>
        // --- DATA BUKU ---
        let bookData = []; 

        // --- VARIABEL SISTEM ---
        let currentPageIndex = 0;
        let currentViewId = 1; 
        
        const mainApp = document.getElementById('mainApp');
        const navBar = document.getElementById('navBar');
        const pageIndicator = document.getElementById('pageIndicator');
        const bookContainer = document.getElementById('bookContainer');
        let currentAudio = null;
        let isAnimating = false;

        // Variabel Zoom & Pan
        let scale = 1;
        let lastScale = 1;
        let startDist = 0;
        let isZooming = false;
        
        // Perbaikan Logic Pan (Geser) - Menggunakan Delta
        let translateX = 0;
        let translateY = 0;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isPanning = false;

        // Variabel Dimensi Terakhir (untuk limit geser)
        let lastFinalW = 0;
        let lastFinalH = 0;

        // Input Halaman HTML element
        const jumpInput = document.getElementById('jumpInput');

        // --- FUNGSI LOCAL STORAGE (SIMPAN HALAMAN TERAKHIR) ---
        function saveLastPage(index) {
            try {
                localStorage.setItem('qarana_last_page', index);
            } catch (e) {
                console.warn("LocalStorage tidak didukung di browser ini.");
            }
        }

        function getLastPage() {
            try {
                return parseInt(localStorage.getItem('qarana_last_page'));
            } catch (e) {
                return null;
            }
        }

        function showResumePrompt(savedIndex) {
            const overlay = document.getElementById('resumeModalOverlay');
            const textMsg = document.getElementById('resumeTextMsg');
            
            textMsg.innerText = `Anda terakhir membaca di Halaman ${savedIndex}. Lanjutkan?`;
            overlay.style.display = 'flex';

            document.getElementById('btnResumeYes').onclick = () => {
                overlay.style.display = 'none';
                loadPage(savedIndex, null); // Langsung muat halaman yang disimpan
            };

            document.getElementById('btnResumeNo').onclick = () => {
                overlay.style.display = 'none';
                loadPage(0, null); // Mulai dari awal (Cover)
            };
        }


        // --- LOGIKA UTAMA (SLIDE MULUS TANPA BLANK) ---
        function loadPage(index, direction = null) {
            if (index < 0 || index >= bookData.length) return;
            if (isAnimating) return; 

            const activeEl = document.getElementById('view' + currentViewId);
            const nextViewId = currentViewId === 1 ? 2 : 1;
            const nextEl = document.getElementById('view' + nextViewId);

            // Reset Zoom & Pan saat pindah halaman
            resetZoom(activeEl);
            resetZoom(nextEl);

            if (index === 0) {
                pageIndicator.innerText = "Cover";
                jumpInput.value = "";
            } else {
                pageIndicator.innerText = `Halaman ${index}`; 
                jumpInput.value = index;
            }

            // Memperbarui UI TOC
            updateTocHighlight(index);

            // Simpan jejak halaman ke Local Storage
            saveLastPage(index);

            renderDataToElement(nextEl, index);

            if (direction === null) {
                renderDataToElement(activeEl, index);
                
                activeEl.style.transition = 'none';
                activeEl.style.transform = 'translateX(0)';
                nextEl.style.transition = 'none';
                nextEl.style.transform = 'translateX(100%)'; 
                return;
            }

            isAnimating = true;

            nextEl.style.transition = 'none';
            if (direction === 'next') {
                nextEl.style.transform = 'translateX(100%)';
            } else {
                nextEl.style.transform = 'translateX(-100%)';
            }

            void nextEl.offsetWidth;

            const transitionStyle = 'transform 0.35s ease-out';
            activeEl.style.transition = transitionStyle;
            nextEl.style.transition = transitionStyle;

            if (direction === 'next') {
                activeEl.style.transform = 'translateX(-100%)';
                nextEl.style.transform = 'translateX(0)';
            } else {
                activeEl.style.transform = 'translateX(100%)';
                nextEl.style.transform = 'translateX(0)';
            }

            setTimeout(() => {
                isAnimating = false;
                currentPageIndex = index;
                currentViewId = nextViewId; 
                syncDimensions(nextEl);
            }, 350); 
        }

        function renderDataToElement(containerEl, index) {
            const data = bookData[index];
            const imgEl = containerEl.querySelector('.page-image');
            const layerEl = containerEl.querySelector('.hotspot-layer');

            imgEl.src = "image/" + data.imageName;
            
            if (index === 0) {
                imgEl.classList.add('is-cover');
            } else {
                imgEl.classList.remove('is-cover');
            }

            layerEl.innerHTML = '';
            if (data.hotspots) {
                data.hotspots.forEach(h => {
                    const div = document.createElement('div');
                    div.className = 'hotspot-zone';
                    div.style.left = h.left + '%';
                    div.style.top = h.top + '%';
                    div.style.width = h.width + '%';
                    div.style.height = h.height + '%';
                    
                    div.onclick = (e) => {
                        e.stopPropagation(); 
                        playAudio(h.audio, div);
                    };
                    
                    layerEl.appendChild(div);
                });
            }
            
            imgEl.onload = () => syncDimensions(containerEl);
            syncDimensions(containerEl);
        }

        function toggleNav() {
            if (scale <= 1.1 && !document.getElementById('modalOverlay').classList.contains('show')) {
                mainApp.classList.toggle('nav-hidden');
            }
        }

        function prevPage(e) { 
            if(e) e.stopPropagation(); 
            loadPage(currentPageIndex - 1, 'prev'); 
        }
        function nextPage(e) { 
            if(e) e.stopPropagation(); 
            loadPage(currentPageIndex + 1, 'next'); 
        }

        // --- NAVIGASI JUMP INPUT & MODAL ---
        
        // Listener untuk Enter di kotak input halaman
        jumpInput.addEventListener('change', function(e) {
            let val = parseInt(e.target.value);
            if (isNaN(val)) return;
            // Batasi agar tidak melampaui jumlah halaman
            if (val < 0) val = 0;
            if (val >= bookData.length) val = bookData.length - 1;
            
            // Tentukan arah slide animasi
            let direction = val > currentPageIndex ? 'next' : 'prev';
            if (val !== currentPageIndex) {
                loadPage(val, direction);
            }
        });

        // Buka Pop Up Modal
        function openModal(e, modalId) {
            e.stopPropagation(); // Mencegah toggleNav tereksekusi
            document.getElementById('modalOverlay').classList.add('show');
            document.querySelectorAll('.modal-content').forEach(el => el.classList.remove('active'));
            document.getElementById(modalId).classList.add('active');
        }

        // Tutup Pop Up Modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.querySelectorAll('.modal-content').forEach(el => el.classList.remove('active'));
        }

        // Generate Daftar Isi (TOC) Otomatis
        function generateTOC() {
            const tocList = document.getElementById('tocList');
            tocList.innerHTML = '';
            
            bookData.forEach((page, index) => {
                const btn = document.createElement('button');
                btn.className = 'toc-item';
                btn.id = 'tocItem_' + index;
                btn.innerText = index === 0 ? "Cover Depan" : `Halaman ${index}`;
                
                btn.onclick = () => { 
                    let direction = index > currentPageIndex ? 'next' : 'prev';
                    if (index !== currentPageIndex) loadPage(index, direction);
                    closeModal(); 
                };
                
                tocList.appendChild(btn);
            });
        }

        // Update Sorotan Warna di TOC sesuai halaman aktif
        function updateTocHighlight(activeIndex) {
            document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('current'));
            const currentItem = document.getElementById('tocItem_' + activeIndex);
            if (currentItem) currentItem.classList.add('current');
        }


        // --- KEYBOARD & SWIPE CONTROL ---
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") nextPage();
            else if (e.key === "ArrowLeft") prevPage();
        });

        let touchStartX = 0;
        let touchEndX = 0;

        // --- LOGIKA SENTUHAN DIPERHALUS ---
        bookContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isZooming = true;
                startDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            } else if (e.touches.length === 1) {
                isPanning = true;
                lastTouchX = e.touches[0].pageX;
                lastTouchY = e.touches[0].pageY;
                touchStartX = e.touches[0].screenX;
            }
        }, { passive: false });

        bookContainer.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && isZooming) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const delta = dist / startDist;
                scale = Math.min(Math.max(1, lastScale * delta), 4);
                applyZoom();
            } else if (e.touches.length === 1 && isPanning) {
                const currentX = e.touches[0].pageX;
                const currentY = e.touches[0].pageY;
                
                // Hitung selisih pergerakan dari posisi terakhir
                const deltaX = currentX - lastTouchX;
                const deltaY = currentY - lastTouchY;

                // Jika sedang zoom, geser gambar sesuai jari
                if (scale > 1.05) {
                    e.preventDefault();
                    translateX += deltaX;
                    translateY += deltaY;
                    applyZoom();
                }

                // Update posisi sentuhan terakhir
                lastTouchX = currentX;
                lastTouchY = currentY;
            }
        }, { passive: false });

        bookContainer.addEventListener('touchend', (e) => {
            if (isZooming) {
                lastScale = scale;
                if (e.touches.length < 2) isZooming = false;
                applyZoom(); 
            } else if (isPanning) {
                isPanning = false;
                touchEndX = e.changedTouches[0].screenX;
                // Hanya slide halaman jika skala normal (tidak zoom)
                if (scale <= 1.1) {
                    handleSwipe();
                }
            }
        }, false);

        function handleSwipe() {
            const threshold = 50; 
            if (touchEndX < touchStartX - threshold) nextPage();
            if (touchEndX > touchStartX + threshold) prevPage();
        }

        // --- FUNGSI CLAMPING (BATAS GESER) TETAP PRESISI ---
        function applyZoom() {
            const activeEl = document.getElementById('view' + currentViewId);
            const wrapper = activeEl.querySelector('.zoom-wrapper');
            
            const containerW = bookContainer.clientWidth;
            const containerH = bookContainer.clientHeight;

            const zoomedW = lastFinalW * scale;
            const zoomedH = lastFinalH * scale;

            const limitX = Math.max(0, (zoomedW - containerW) / 2);
            const limitY = Math.max(0, (zoomedH - containerH) / 2);

            // Batasi nilai agar tidak tenggelam
            translateX = Math.min(Math.max(translateX, -limitX), limitX);
            translateY = Math.min(Math.max(translateY, -limitY), limitY);

            // Terapkan transformasi (translate harus dibagi scale karena transform-origin di center)
            wrapper.style.transform = `scale(${scale}) translate(${translateX / scale}px, ${translateY / scale}px)`;
            
            if (scale > 1.2) {
                mainApp.classList.add('nav-hidden');
            }
        }

        function resetZoom(container) {
            scale = 1;
            lastScale = 1;
            translateX = 0;
            translateY = 0;
            lastTouchX = 0;
            lastTouchY = 0;
            const wrapper = container.querySelector('.zoom-wrapper');
            if (wrapper) {
                wrapper.style.transition = 'none';
                wrapper.style.transform = `scale(1) translate(0, 0)`;
            }
        }

        bookContainer.addEventListener('click', (e) => {
            if (!e.target.classList.contains('hotspot-zone') && scale <= 1.1) {
                toggleNav();
            }
        });

        // --- FITUR AUDIO ---
        function playAudio(filename, element) {
            document.querySelectorAll('.hotspot-zone').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            const audioPath = "audio/" + filename;
            const audio = new Audio(audioPath);
            
            audio.play()
                .then(() => {
                    currentAudio = audio;
                    audio.onended = () => element.classList.remove('active');
                })
                .catch(error => {
                    console.error("Audio error:", audioPath);
                    const msg = new SpeechSynthesisUtterance("Audio " + filename);
                    msg.lang = 'id-ID';
                    window.speechSynthesis.speak(msg);
                    setTimeout(() => element.classList.remove('active'), 1000);
                });
        }

        // --- FITUR SINKRONISASI UKURAN PRESISI ---
        function syncDimensions(containerEl) {
            if (!containerEl) return;

            const img = containerEl.querySelector('.page-image');
            const layer = containerEl.querySelector('.hotspot-layer');
            const nav = navBar;
            
            const natW = img.naturalWidth;
            const natH = img.naturalHeight;
            const dispW = containerEl.clientWidth; 
            const dispH = containerEl.clientHeight; 

            if (!natW || !natH) return; 

            const ratioNat = natW / natH;
            const ratioDisp = dispW / dispH;

            let finalW, finalH;

            if (ratioDisp > ratioNat) {
                finalH = dispH;
                finalW = dispH * ratioNat;
            } else {
                finalW = dispW;
                finalH = dispW / ratioNat;
            }

            lastFinalW = finalW;
            lastFinalH = finalH;

            layer.style.width = finalW + 'px';
            layer.style.height = finalH + 'px';
            
            if (containerEl.id === 'view' + currentViewId) {
                nav.style.width = Math.min(finalW, 600) + 'px';
            }
        }

        window.addEventListener('resize', () => {
            const activeEl = document.getElementById('view' + currentViewId);
            syncDimensions(activeEl);
            if (scale > 1) applyZoom(); 
        });

        // --- FETCH DATA DARI data.json ---
        async function initApp() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                bookData = await response.json();
            } catch (error) {
                console.warn("Gagal memuat data.json. Menggunakan data sampel sementara.", error);
                bookData = [
                    { "imageName": "cover.jpg", "hotspots": [] },
                    { "imageName": "halaman1.jpg", "hotspots": [] }
                ];
            }

            if (bookData && bookData.length > 0) {
                generateTOC(); // Bangun Daftar isi setelah data termuat

                // Cek apakah ada history halaman terakhir dibaca
                const savedPage = getLastPage();
                
                // Jika ada halaman tersimpan, pastikan halamannya valid, dan bukan cover
                if (savedPage !== null && savedPage > 0 && savedPage < bookData.length) {
                    showResumePrompt(savedPage);
                } else {
                    // Kalau tidak ada atau baru mulai, buka dari cover
                    loadPage(0, null);
                }
            } else {
                pageIndicator.innerText = "Data Kosong";
            }
        }

        initApp();
    </script>
