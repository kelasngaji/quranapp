<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Qarana Digital App</title>
    <style>
        /* RESET & DASAR */
        *, *::before, *::after { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            background: #333; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* CONTAINER UTAMA */
        #mainApp {
            width: 100%;
            max-width: 600px; 
            height: 100%;
            background: transparent; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- 1. NAVIGASI (HEADER) --- */
        .nav-bar {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;

            background: rgba(34, 34, 34, 0.95); 
            color: white;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            width: 100%; 
            
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);

            transition: top 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .nav-hidden .nav-bar {
            top: -80px; 
        }

        .nav-btn {
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            transition: background 0.2s;
            user-select: none;
        }
        .nav-btn:hover { background-color: rgba(255, 255, 255, 0.3); }
        .nav-btn:active { transform: scale(0.95); }

        #pageIndicator { 
            font-weight: 600; 
            font-size: 1rem; 
            color: #eee; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* --- 2. AREA GAMBAR (CANVAS) --- */
        .book-container {
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow: hidden;
            position: relative;
            touch-action: none; 
        }

        /* WADAH HALAMAN (Double Buffer System) */
        .page-view {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            
            transition: transform 0.35s ease-out; 
            will-change: transform;
            
            transform: translateX(100%); 
        }
        
        .page-view.active { transform: translateX(0); z-index: 10; }
        .page-view.left   { transform: translateX(-100%); z-index: 5; }
        .page-view.right  { transform: translateX(100%); z-index: 5; }

        /* Container tambahan untuk Zoom & Pan */
        .zoom-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
            will-change: transform;
        }

        /* Gambar Halaman */
        .page-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain; 
            user-select: none;
            -webkit-user-drag: none;
        }

        .page-image.is-cover {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* --- 3. HOTSPOT (AREA KLIK) --- */
        .hotspot-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hotspot-zone {
            position: absolute;
            cursor: pointer;
            z-index: 20;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .hotspot-zone:active, .hotspot-zone.active {
            background-color: rgba(255, 230, 0, 0.3);
            border: 2px solid orange;
        }
    </style>
</head>
<body>

    <div id="mainApp">
        <!-- HEADER / NAVIGASI -->
        <div class="nav-bar" id="navBar">
            <button class="nav-btn" onclick="prevPage(event)" title="Sebelumnya">❮</button>
            <span id="pageIndicator">Memuat...</span>
            <button class="nav-btn" onclick="nextPage(event)" title="Selanjutnya">❯</button>
        </div>

        <!-- AREA BUKU (Double Buffer) -->
        <div class="book-container" id="bookContainer">
            
            <!-- Wadah 1 -->
            <div id="view1" class="page-view active">
                <div class="zoom-wrapper">
                    <img class="page-image" src="" alt="">
                    <div class="hotspot-layer"></div>
                </div>
            </div>

            <!-- Wadah 2 -->
            <div id="view2" class="page-view right">
                <div class="zoom-wrapper">
                    <img class="page-image" src="" alt="">
                    <div class="hotspot-layer"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- DATA BUKU ---
        let bookData = []; 

        // --- VARIABEL SISTEM ---
        let currentPageIndex = 0;
        let currentViewId = 1; 
        
        const mainApp = document.getElementById('mainApp');
        const navBar = document.getElementById('navBar');
        const pageIndicator = document.getElementById('pageIndicator');
        const bookContainer = document.getElementById('bookContainer');
        let currentAudio = null;
        let isAnimating = false;

        // Variabel Zoom & Pan
        let scale = 1;
        let lastScale = 1;
        let startDist = 0;
        let isZooming = false;
        
        // Variabel Pan (Geser)
        let translateX = 0;
        let translateY = 0;
        let lastTranslateX = 0;
        let lastTranslateY = 0;
        let panStartX = 0;
        let panStartY = 0;

        // Variabel Dimensi Terakhir (untuk limit geser)
        let lastFinalW = 0;
        let lastFinalH = 0;

        // --- LOGIKA UTAMA (SLIDE MULUS TANPA BLANK) ---
        function loadPage(index, direction = null) {
            if (index < 0 || index >= bookData.length) return;
            if (isAnimating) return; 

            const activeEl = document.getElementById('view' + currentViewId);
            const nextViewId = currentViewId === 1 ? 2 : 1;
            const nextEl = document.getElementById('view' + nextViewId);

            // Reset Zoom & Pan saat pindah halaman
            resetZoom(activeEl);
            resetZoom(nextEl);

            if (index === 0) {
                pageIndicator.innerText = "Cover";
            } else {
                pageIndicator.innerText = `Halaman ${index}`; 
            }

            renderDataToElement(nextEl, index);

            if (direction === null) {
                renderDataToElement(activeEl, index);
                
                activeEl.style.transition = 'none';
                activeEl.style.transform = 'translateX(0)';
                nextEl.style.transition = 'none';
                nextEl.style.transform = 'translateX(100%)'; 
                return;
            }

            isAnimating = true;

            nextEl.style.transition = 'none';
            if (direction === 'next') {
                nextEl.style.transform = 'translateX(100%)';
            } else {
                nextEl.style.transform = 'translateX(-100%)';
            }

            void nextEl.offsetWidth;

            const transitionStyle = 'transform 0.35s ease-out';
            activeEl.style.transition = transitionStyle;
            nextEl.style.transition = transitionStyle;

            if (direction === 'next') {
                activeEl.style.transform = 'translateX(-100%)';
                nextEl.style.transform = 'translateX(0)';
            } else {
                activeEl.style.transform = 'translateX(100%)';
                nextEl.style.transform = 'translateX(0)';
            }

            setTimeout(() => {
                isAnimating = false;
                currentPageIndex = index;
                currentViewId = nextViewId; 
                
                syncDimensions(nextEl);
            }, 350); 
        }

        function renderDataToElement(containerEl, index) {
            const data = bookData[index];
            const imgEl = containerEl.querySelector('.page-image');
            const layerEl = containerEl.querySelector('.hotspot-layer');

            imgEl.src = "image/" + data.imageName;
            
            if (index === 0) {
                imgEl.classList.add('is-cover');
            } else {
                imgEl.classList.remove('is-cover');
            }

            layerEl.innerHTML = '';
            if (data.hotspots) {
                data.hotspots.forEach(h => {
                    const div = document.createElement('div');
                    div.className = 'hotspot-zone';
                    div.style.left = h.left + '%';
                    div.style.top = h.top + '%';
                    div.style.width = h.width + '%';
                    div.style.height = h.height + '%';
                    
                    div.onclick = (e) => {
                        e.stopPropagation(); 
                        playAudio(h.audio, div);
                    };
                    
                    layerEl.appendChild(div);
                });
            }
            
            imgEl.onload = () => syncDimensions(containerEl);
            syncDimensions(containerEl);
        }

        function toggleNav() {
            if (scale <= 1.1) {
                mainApp.classList.toggle('nav-hidden');
            }
        }

        function prevPage(e) { 
            if(e) e.stopPropagation(); 
            loadPage(currentPageIndex - 1, 'prev'); 
        }
        function nextPage(e) { 
            if(e) e.stopPropagation(); 
            loadPage(currentPageIndex + 1, 'next'); 
        }

        // --- KEYBOARD & SWIPE CONTROL ---
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") nextPage();
            else if (e.key === "ArrowLeft") prevPage();
        });

        bookContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isZooming = true;
                startDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            } else if (e.touches.length === 1) {
                panStartX = e.touches[0].pageX;
                panStartY = e.touches[0].pageY;
                touchStartX = e.touches[0].screenX;
            }
        }, { passive: false });

        bookContainer.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && isZooming) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                
                const delta = dist / startDist;
                scale = Math.min(Math.max(1, lastScale * delta), 4);
                
                applyZoom();
            } else if (e.touches.length === 1 && scale > 1) {
                e.preventDefault();
                const currentX = e.touches[0].pageX;
                const currentY = e.touches[0].pageY;
                
                translateX = lastTranslateX + (currentX - panStartX);
                translateY = lastTranslateY + (currentY - panStartY);
                
                applyZoom();
            }
        }, { passive: false });

        bookContainer.addEventListener('touchend', (e) => {
            if (isZooming) {
                lastScale = scale;
                if (e.touches.length < 2) isZooming = false;
                applyZoom(); // Pastikan batas tetap terjaga setelah lepas jari
            } else if (scale > 1) {
                lastTranslateX = translateX;
                lastTranslateY = translateY;
            } else {
                touchEndX = e.changedTouches[0].screenX;
                if (scale <= 1.1) {
                    handleSwipe();
                }
            }
        }, false);

        function handleSwipe() {
            const threshold = 50; 
            if (touchEndX < touchStartX - threshold) nextPage();
            if (touchEndX > touchStartX + threshold) prevPage();
        }

        // --- FUNGSI CLAMPING (BATAS GESER) ---
        function applyZoom() {
            const activeEl = document.getElementById('view' + currentViewId);
            const wrapper = activeEl.querySelector('.zoom-wrapper');
            
            // Dapatkan ukuran container saat ini
            const containerW = bookContainer.clientWidth;
            const containerH = bookContainer.clientHeight;

            // Hitung lebar & tinggi gambar setelah diperbesar
            const zoomedW = lastFinalW * scale;
            const zoomedH = lastFinalH * scale;

            // Hitung batas maksimal geser (Limit)
            // Limit adalah setengah dari selisih ukuran (karena transform-origin di center)
            const limitX = Math.max(0, (zoomedW - containerW) / 2);
            const limitY = Math.max(0, (zoomedH - containerH) / 2);

            // Batasi Nilai Translate agar tidak keluar jalur
            translateX = Math.min(Math.max(translateX, -limitX), limitX);
            translateY = Math.min(Math.max(translateY, -limitY), limitY);

            // Update variabel last untuk touch selanjutnya
            lastTranslateX = translateX;
            lastTranslateY = translateY;
            
            // Terapkan ke CSS
            wrapper.style.transform = `scale(${scale}) translate(${translateX / scale}px, ${translateY / scale}px)`;
            
            if (scale > 1.2) {
                mainApp.classList.add('nav-hidden');
            } else {
                // Jangan paksa hapus nav-hidden di sini agar toggle manual tetap bekerja
            }
        }

        function resetZoom(container) {
            scale = 1;
            lastScale = 1;
            translateX = 0;
            translateY = 0;
            lastTranslateX = 0;
            lastTranslateY = 0;
            const wrapper = container.querySelector('.zoom-wrapper');
            if (wrapper) {
                wrapper.style.transition = 'none';
                wrapper.style.transform = `scale(1) translate(0, 0)`;
                setTimeout(() => wrapper.style.transition = 'transform 0.1s ease-out', 50);
            }
        }

        bookContainer.addEventListener('click', (e) => {
            if (!e.target.classList.contains('hotspot-zone') && scale <= 1.1) {
                toggleNav();
            }
        });

        // --- FITUR AUDIO ---
        function playAudio(filename, element) {
            document.querySelectorAll('.hotspot-zone').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            const audioPath = "audio/" + filename;
            const audio = new Audio(audioPath);
            
            audio.play()
                .then(() => {
                    currentAudio = audio;
                    audio.onended = () => element.classList.remove('active');
                })
                .catch(error => {
                    console.error("Audio error:", audioPath);
                    const msg = new SpeechSynthesisUtterance("Audio " + filename);
                    msg.lang = 'id-ID';
                    window.speechSynthesis.speak(msg);
                    setTimeout(() => element.classList.remove('active'), 1000);
                });
        }

        // --- FITUR SINKRONISASI UKURAN PRESISI ---
        function syncDimensions(containerEl) {
            if (!containerEl) return;

            const img = containerEl.querySelector('.page-image');
            const layer = containerEl.querySelector('.hotspot-layer');
            const nav = navBar;
            
            const natW = img.naturalWidth;
            const natH = img.naturalHeight;
            const dispW = containerEl.clientWidth; 
            const dispH = containerEl.clientHeight; 

            if (!natW || !natH) return; 

            const ratioNat = natW / natH;
            const ratioDisp = dispW / dispH;

            let finalW, finalH;

            if (ratioDisp > ratioNat) {
                finalH = dispH;
                finalW = dispH * ratioNat;
            } else {
                finalW = dispW;
                finalH = dispW / ratioNat;
            }

            // Simpan dimensi visual terakhir untuk kalkulasi batas geser
            lastFinalW = finalW;
            lastFinalH = finalH;

            layer.style.width = finalW + 'px';
            layer.style.height = finalH + 'px';
            
            if (containerEl.id === 'view' + currentViewId) {
                nav.style.width = Math.min(finalW, 600) + 'px';
            }
        }

        window.addEventListener('resize', () => {
            const activeEl = document.getElementById('view' + currentViewId);
            syncDimensions(activeEl);
            if (scale > 1) applyZoom(); // Update batas jika layar diputar/resize saat zoom
        });

        // --- FETCH DATA DARI data.json ---
        async function initApp() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                bookData = await response.json();
            } catch (error) {
                console.warn("Gagal memuat data.json. Menggunakan data sampel sementara.", error);
                bookData = [
                    { "imageName": "cover.jpg", "hotspots": [] },
                    { "imageName": "halaman1.jpg", "hotspots": [] }
                ];
            }

            if (bookData && bookData.length > 0) {
                loadPage(0, null);
            } else {
                pageIndicator.innerText = "Data Kosong";
            }
        }

        initApp();
    </script>
</body>
</html>
